<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sipa</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #050505; 
            font-family: sans-serif;
        }
        #start-overlay {
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            color: #ff007f; 
            font-size: 24px; 
            cursor: pointer; 
            z-index: 10;
            text-shadow: 0 0 15px #ff007f;
            text-align: center;
        }
        .pulse {
            animation: pulsing 1.5s infinite;
        }
        @keyframes pulsing {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="start-overlay">
        <h2 class="pulse">❤️ Click anywhere to start ❤️</h2>
        <p style="font-size: 16px; color: #ffb6c1;">Turn on your volume</p>
    </div>
    
    <audio id="bgm" src="song.mp3" loop></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script>
        // --- 3D Scene Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.015);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 50;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // OrbitControls for manual 3D rotation
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true; 
        controls.autoRotateSpeed = 0.8;

        // --- Glowing Text & Emoji Generation ---
        function createGlowTexture(text, isEmoji = false) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');

            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            if (isEmoji) {
                ctx.font = "80px Arial";
                ctx.shadowColor = "#ff0000"; // Red glow for heart
                ctx.shadowBlur = 30;
                ctx.fillText(text, 256, 128);
            } else {
                ctx.font = "bold 55px 'Comic Sans MS', cursive, sans-serif";
                ctx.shadowColor = "#ff007f"; // Neon pink glow
                ctx.shadowBlur = 25;
                ctx.fillStyle = "#ffccf2"; // Light pink text color
                ctx.fillText(text, 256, 128);

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sipa</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
            color: white;
        }
        #loadingText {
            font-size: 24px;
            color: #ff66b2;
            margin-bottom: 20px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        #startBtn {
            padding: 15px 35px;
            font-size: 20px;
            background: transparent;
            color: #ff66b2;
            border: 2px solid #ff66b2;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px #ff66b2;
            display: none;
            transition: 0.3s;
        }
        #startBtn:hover {
            background: #ff66b2;
            color: white;
        }
    </style>
</head>
<body>

<div id="overlay">
    <div id="loadingText">লোড হবা লাগছে... (Loading...)</div>
    <button id="startBtn">Click to Start</button>
</div>

<audio id="bgMusic" src="song.mp3" loop preload="auto"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
